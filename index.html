<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel6 Assignment</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <h2>Fill your Details</h2>
        </div>
        <form action="thankyou.html" class="form" name="form" id="form" method="get">
            <div class="form-control">
                <label>FullName</label>
                <input type="text" id="name" name="name" required>
                <small>Error Message</small>
            </div>
            <div class="form-control">
                <label>Email</label>
                <input type="email" id="email" name="email" required>
                <small>Error Message</small>
            </div>
            <div class="form-control">
                <label>Phone No</label>
                <input type="phone" id="phone" name="phone" maxlength="18" required>
                <b></b><span></span><small id="error">Error Message</small>
            </div>
            <input type="submit" class="button" value="Submit">
        </form>
    </div>
    <b></b><span></span>
    <script src="./script.js"></script>

</body>

</html>
